[default]
# Database
database_url = "sqlite:///data/leadgen.db"
supabase_url = "CHANGE_ME"
supabase_key = "CHANGE_ME"

# Logging
log_level = "INFO"

# Rate limiting
requests_per_minute = 30
delay_min = 2.0
delay_max = 8.0

# Scoring thresholds (0-100 scale)
[default.scoring]
tier_a = 75
tier_b = 50
tier_c = 25

# Polling intervals (minutes)
[default.polling]
high_activity_mins = 15
medium_activity_mins = 60
low_activity_mins = 1440

# API credit budgets (free tier monthly limits)
[default.api_budgets]
