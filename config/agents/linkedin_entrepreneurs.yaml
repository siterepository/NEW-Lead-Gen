# LinkedIn/Apollo Agent - Entrepreneurs
# Searches Apollo for founders, co-founders, and business owners in Utah.
# Uses Apollo People Search API (free tier).

agent:
  name: linkedin_entrepreneurs
  description: "Search Apollo for entrepreneurs and business owners in Utah"
  platform: linkedin_apollo
  category: entrepreneurs
  enabled: true

source:
  api: apollo_people_search
  api_url: "https://api.apollo.io/api/v1/mixed_people/search"
  search_params:
    person_titles:
      - "Founder"
      - "Co-Founder"
      - "Owner"
      - "Business Owner"
      - "CEO"
      - "Managing Partner"
      - "Principal"
      - "Entrepreneur"
      - "President"
      - "Sole Proprietor"
      - "Small Business Owner"
      - "Startup Founder"
    person_locations:
      - "Utah, United States"
    person_seniorities:
      - "founder"
      - "owner"
      - "c_suite"

credits:
  per_run_credit_limit: 7
  results_per_page: 7
  monthly_budget_share: 7  # Out of 60 total monthly credits

scraping:
  requests_per_minute: 5
  delay_min: 1.0
  delay_max: 2.0
  schedule_minutes: 10080  # Weekly
  max_results_per_run: 7

filters:
  require_utah_location: true
