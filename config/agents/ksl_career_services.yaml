# KSL Classifieds - Career Services Agent
# Scrapes KSL classifieds for career coaches, resume writers, and job placement services.

agent:
  name: ksl_career_services
  description: "Scrape KSL classifieds for career service providers in Utah"
  platform: ksl
  category: career_services
  enabled: true

source:
  base_url: "https://classifieds.ksl.com"
  search_params:
    categories:
      - "Career-Services"
      - "Services"
      - "Business-Opportunities"
    state: "Utah"
    keywords:
      - "career coaching"
      - "resume writing"
      - "interview prep"
      - "job placement"
      - "career counseling"
      - "employment services"
      - "career mentor"
      - "professional development"
      - "career transition coaching"
      - "executive job search"
      - "outplacement"
      - "career strategy"
      - "job search help"
      - "LinkedIn profile"
    sort: "newest"
    zip: "84101"
    miles: 100

scraping:
  rate_limit:
    requests_per_minute: 20
    delay_min: 2.0
    delay_max: 8.0
  schedule_minutes: 90
  max_pages: 10
  max_results_per_run: 200

selectors:
  listing_container: "div.listing-item, div.search-result, article.listing"
  title: "h2.item-title a, h3.listing-title a, a.item-link"
  price: "span.listing-price, span.item-price"
  description: "div.item-description, p.listing-description"
  location: "span.item-location, span.listing-location"
  date_posted: "span.item-date, time, span.listing-date"
  contact_link: "a.contact-seller"
  detail_url: "h2.item-title a::attr(href)"
  phone: "span.phone-number, a[href^='tel:']"
  image: "div.item-image img::attr(src)"
  next_page: "a.pagination-next, a[rel='next']"

extraction:
  fields:
    - name: title
      required: true
    - name: description
      required: true
    - name: location
      required: false
    - name: price
      required: false
    - name: date_posted
      required: false
    - name: contact_info
      required: false
    - name: detail_url
      required: true

filters:
  min_description_length: 20
  exclude_keywords:
    - "scam"
    - "MLM"
    - "pyramid"
  require_utah_location: true
