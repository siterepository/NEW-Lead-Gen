# KSL Classifieds - Services Offered Agent
# Scrapes KSL classifieds for people offering professional services in Utah.
# Targets freelancers, consultants, side hustlers, and people between jobs.

agent:
  name: ksl_services_offered
  description: "Scrape KSL classifieds for people offering professional services in Utah"
  platform: ksl
  category: services_offered
  enabled: true

source:
  base_url: "https://classifieds.ksl.com"
  search_params:
    categories:
      - "Services"
      - "Professional-Services"
      - "Financial-Services"
      - "Consulting"
      - "Coaching-Tutoring"
      - "Real-Estate-Services"
    state: "Utah"
    keywords:
      - "consulting"
      - "financial services"
      - "coaching"
      - "business consulting"
      - "real estate services"
      - "insurance"
      - "tax preparation"
      - "bookkeeping"
      - "personal training"
      - "tutoring"
      - "marketing services"
      - "sales consultant"
      - "life coaching"
      - "career coaching"
      - "professional services"
      - "accounting"
      - "financial planning"
      - "investment"
      - "mortgage"
      - "notary"
    sort: "newest"

scraping:
  rate_limit:
    requests_per_minute: 20
    delay_min: 2.0
    delay_max: 8.0
  schedule_minutes: 120
  max_pages: 10
  max_results_per_run: 200

selectors:
  listing_container: "div.listing-item, div.search-result, article.listing"
  title: "h2.item-title a, h3.listing-title a, a.item-link"
  price: "span.listing-price, span.item-price"
  description: "div.item-description, p.listing-description"
  location: "span.item-location, span.listing-location"
  date_posted: "span.item-date, time, span.listing-date"
  contact_link: "a.contact-seller"
  detail_url: "h2.item-title a::attr(href)"
  phone: "span.phone-number, a[href^='tel:']"
  image: "div.item-image img::attr(src)"
  next_page: "a.pagination-next, a[rel='next']"

extraction:
  fields:
    - name: title
      required: true
    - name: description
      required: true
    - name: location
      required: false
    - name: price
      required: false
    - name: date_posted
      required: false
    - name: contact_info
      required: false
    - name: detail_url
      required: true
    - name: service_type
      required: false

filters:
  min_description_length: 20
  exclude_keywords:
    - "scam"
    - "MLM"
    - "pyramid"
  require_utah_location: true
  # Prioritize these service types in scoring
  priority_service_types:
    - "financial"
    - "insurance"
    - "real_estate"
    - "consulting"
    - "coaching"
    - "sales_marketing"
