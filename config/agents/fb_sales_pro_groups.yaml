# Facebook Utah Sales Professional Groups Agent
# Finds public Utah sales professional Facebook groups via Google search.
# NOTE: Only accesses publicly visible content. No Facebook login.

agent:
  name: fb_sales_pro_groups
  description: "Find public Utah sales professional Facebook groups"
  platform: facebook
  category: facebook
  enabled: true

source:
  method: "google_search"
  google_queries:
    - 'site:facebook.com/groups "utah" "sales professionals"'
    - 'site:facebook.com/groups "utah" "sales" "networking"'
    - 'site:facebook.com/groups "utah" "sales career"'
    - 'site:facebook.com/groups "utah" "sales reps"'
    - 'site:facebook.com/groups "salt lake" "sales"'
    - 'site:facebook.com/groups "utah" "B2B sales"'
    - 'site:facebook.com/groups "utah" "insurance sales"'
    - 'site:facebook.com/groups "utah" "financial sales"'
    - 'site:facebook.com/groups "utah" "account executive"'

scraping:
  rate_limit:
    requests_per_minute: 8
    delay_min: 3.0
    delay_max: 10.0
  schedule_minutes: 1440
  max_results_per_run: 50
  headless: true

output:
  requires_manual_monitoring: true
  group_type: "sales_professional"
