# Craigslist Salt Lake City - Resumes Agent
# Scrapes CL SLC resumes section for people posting resumes publicly.

agent:
  name: craigslist_slc_resumes
  description: "Scrape Craigslist SLC resumes section for people posting resumes in Utah"
  platform: craigslist
  category: resumes
  enabled: true

source:
  base_url: "https://saltlakecity.craigslist.org"
  search_path: "/search/res"
  search_params:
    keywords:
      - "sales"
      - "business development"
      - "finance"
      - "accounting"
      - "management"
      - "marketing"
      - "insurance"
      - "real estate"
      - "customer service"
      - "leadership"
      - "entrepreneur"
      - "professional"
    sort: "date"

scraping:
  rate_limit:
    requests_per_minute: 10
    delay_min: 5.0
    delay_max: 10.0
  schedule_minutes: 120
  max_pages: 5
  max_results_per_run: 150

selectors:
  listing_container: "li.cl-static-search-result, li.result-row, ol.cl-static-search-results > li"
  title: "a.titlestring, a.result-title, a.posting-title, a.cl-app-anchor"
  description: "span.result-meta, div.meta"
  location: "span.result-hood, span.nearby"
  date_posted: "time.result-date, time, span.date"
  image: "a.result-image img::attr(src)"
  next_page: "a.button.next, a.cl-next-page, a[title='next page']"

extraction:
  fields:
    - name: title
      required: true
    - name: description
      required: false
    - name: location
      required: false
    - name: date_posted
      required: false
    - name: detail_url
      required: true

filters:
  min_description_length: 10
  exclude_keywords:
    - "scam"
    - "MLM"
    - "pyramid"
