# LinkedIn/Apollo Agent - Career Changers
# Searches Apollo for people in Utah in career transition.
# Uses Apollo People Search API (free tier).

agent:
  name: linkedin_career_changers
  description: "Search Apollo for career changers and job transitioners in Utah"
  platform: linkedin_apollo
  category: career_changers
  enabled: true

source:
  api: apollo_people_search
  api_url: "https://api.apollo.io/api/v1/mixed_people/search"
  search_params:
    person_titles:
      - "Career Transition"
      - "Open to Opportunities"
      - "Seeking New Opportunities"
      - "In Transition"
      - "Career Change"
      - "Freelancer"
      - "Consultant"
      - "Independent Contractor"
      - "Self-Employed"
      - "Looking for Opportunities"
    person_locations:
      - "Utah, United States"
    person_seniorities:
      - "senior"
      - "manager"
      - "director"
      - "vp"

credits:
  per_run_credit_limit: 5
  results_per_page: 5
  monthly_budget_share: 5  # Out of 60 total monthly credits

scraping:
  requests_per_minute: 5
  delay_min: 1.0
  delay_max: 2.0
  schedule_minutes: 10080  # Weekly (7 days)
  max_results_per_run: 5

filters:
  require_utah_location: true
  min_seniority: "senior"
