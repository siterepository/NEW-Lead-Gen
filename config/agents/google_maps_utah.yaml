# Google Maps Utah Agent
# Finds new businesses in Utah via Google Maps / Places API.
# Uses Google Places API (free $200/mo credit) when API key available,
# otherwise falls back to scraping Google Maps search results.

agent:
  name: google_maps_utah
  description: "Find new businesses in Utah via Google Maps / Places API"
  platform: google_maps
  category: directories
  enabled: true

source:
  maps_url: "https://www.google.com/maps"
  api_url: "https://maps.googleapis.com/maps/api/place"
  # Set GOOGLE_PLACES_API_KEY env var or provide key here
  google_places_api_key: ""
  search_params:
    region: "us"
    search_radius_meters: 30000
    queries:
      - "new business Utah"
      - "financial services Utah"
      - "insurance agency Utah"
      - "real estate agency Utah"
      - "consulting firm Utah"
      - "small business Utah"
      - "startup Utah"
      - "entrepreneur Utah"
      - "coaching business Utah"
      - "marketing agency Utah"
    api_types:
      - "accounting"
      - "insurance_agency"
      - "real_estate_agency"
    locations:
      - name: "Salt Lake City"
        lat: 40.7608
        lng: -111.8910
      - name: "Provo"
        lat: 40.2338
        lng: -111.6585
      - name: "Ogden"
        lat: 41.2230
        lng: -111.9738
      - name: "St George"
        lat: 37.0965
        lng: -113.5684
      - name: "Orem"
        lat: 40.2969
        lng: -111.6946
      - name: "Sandy"
        lat: 40.5649
        lng: -111.8389
      - name: "Lehi"
        lat: 40.3916
        lng: -111.8508
      - name: "Logan"
        lat: 41.7370
        lng: -111.8338

scraping:
  rate_limit:
    requests_per_minute: 10
    delay_min: 2.0
    delay_max: 5.0
  schedule_minutes: 120
  max_results_per_run: 200

selectors:
  # Browser fallback selectors
  listing_container: "div.Nv2PK, a.hfpxzc"
  business_name: "div.qBF1Pd, div.fontHeadlineSmall"
  rating: "span.MW4etd"
  review_count: "span.UY7F9"
  info: "div.W4Efsd span"

extraction:
  fields:
    - name: business_name
      required: true
    - name: address
      required: false
    - name: rating
      required: false
    - name: review_count
      required: false

filters:
  require_utah_location: true
