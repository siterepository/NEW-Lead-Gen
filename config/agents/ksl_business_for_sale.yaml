# KSL Classifieds - Business For Sale Agent
# Scrapes KSL classifieds for people selling businesses in Utah.
# Business sellers are prime recruiting targets: entrepreneurial, in transition,
# may have capital, and proven sales/leadership skills.

agent:
  name: ksl_business_for_sale
  description: "Scrape KSL classifieds for businesses listed for sale in Utah"
  platform: ksl
  category: business_for_sale
  enabled: true

source:
  base_url: "https://classifieds.ksl.com"
  search_params:
    categories:
      - "Business-Opportunities"
      - "Businesses-For-Sale"
      - "Commercial"
      - "Franchise"
    state: "Utah"
    keywords:
      - "business for sale"
      - "franchise"
      - "turnkey business"
      - "established business"
      - "business opportunity"
      - "retiring owner"
      - "owner financing"
      - "revenue"
      - "profitable business"
      - "client list"
      - "customer base"
      - "inventory included"
      - "relocating"
      - "must sell"
      - "partnership"
      - "investment opportunity"
    sort: "newest"

scraping:
  rate_limit:
    requests_per_minute: 20
    delay_min: 2.0
    delay_max: 8.0
  schedule_minutes: 180
  max_pages: 10
  max_results_per_run: 200

selectors:
  listing_container: "div.listing-item, div.search-result, article.listing"
  title: "h2.item-title a, h3.listing-title a, a.item-link"
  price: "span.listing-price, span.item-price"
  description: "div.item-description, p.listing-description"
  location: "span.item-location, span.listing-location"
  date_posted: "span.item-date, time, span.listing-date"
  contact_link: "a.contact-seller"
  detail_url: "h2.item-title a::attr(href)"
  phone: "span.phone-number, a[href^='tel:']"
  image: "div.item-image img::attr(src)"
  next_page: "a.pagination-next, a[rel='next']"

extraction:
  fields:
    - name: title
      required: true
    - name: description
      required: true
    - name: location
      required: false
    - name: price
      required: false
    - name: date_posted
      required: false
    - name: contact_info
      required: false
    - name: detail_url
      required: true
    - name: business_type
      required: false
    - name: price_numeric
      required: false

filters:
  min_description_length: 20
  exclude_keywords:
    - "scam"
    - "MLM"
    - "pyramid"
  require_utah_location: true
  # Prioritize these business types (transferable skills for NWM)
  priority_business_types:
    - "financial_services"
    - "insurance"
    - "real_estate"
    - "professional_services"
    - "franchise"
    - "fitness"
  # Price thresholds help gauge business scale and owner capital
  min_price: 0
  max_price: null  # No upper limit
